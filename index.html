<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approfondimenti — Secondaria I grado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem 1rem;
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: .3rem;
    }

    .subtitle {
      color: #666;
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #888;
      margin: 2rem 0 .6rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: .3rem;
    }

    .section-title:first-of-type { margin-top: 0; }

    ul { list-style: none; }

    li a {
      display: block;
      padding: .55rem 0;
      color: #1a5276;
      text-decoration: none;
      border-bottom: 1px solid #e8e8e8;
      font-size: .95rem;
    }

    li a:hover {
      color: #0b2a45;
      padding-left: .4rem;
      transition: .15s;
    }
  </style>
</head>
<body>

  <h1>Approfondimenti</h1>
  <p class="subtitle">Secondaria di I grado</p>

  <div id="index"></div>

  <script>
    /*
    ╔══════════════════════════════════════════════╗
    ║  PER AGGIUNGERE UNA PAGINA:                  ║
    ║  Aggiungi un oggetto all'array della         ║
    ║  sezione giusta seguendo il formato:         ║
    ║  { title: "Titolo della pagina",             ║
    ║    link:  "nome-file.html" }                 ║
    ║                                              ║
    ║  PER AGGIUNGERE UNA SEZIONE:                 ║
    ║  Aggiungi un nuovo oggetto a "sections"      ║
    ║  con "name" e "pages" (array di pagine).     ║
    ╚══════════════════════════════════════════════╝
    */

    const sections = [
      {
        name: "Lettere",
        pages: [
          { title: "La Divina Commedia — Canto I", link: "dante-inferno-1.html" },
          { title: "Il Decameron — Introduzione", link: "boccaccio-introduzione.html" },
          { title: "Figure retoriche", link: "figure-retoriche.html" },
          // ← aggiungi qui nuove pagine
        ]
      },
      {
        name: "Scienze Matematiche",
        pages: [
          { title: "Le frazioni", link: "frazioni.html" },
          { title: "Teorema di Pitagora", link: "pitagora.html" },
          { title: "Proporzioni e percentuali", link: "proporzioni.html" },
          // ← aggiungi qui nuove pagine
        ]
      },
      {
        name: "Lingua 2",
        pages: [
          { title: "Irregular Verbs", link: "irregular-verbs.html" },
          { title: "Present Perfect vs Past Simple", link: "present-perfect.html" },
          // ← aggiungi qui nuove pagine
        ]
      },
      {
        name: "Altro",
        pages: [
          { title: "L'Unione Europea", link: "unione-europea.html" },
          { title: "Educazione civica — Costituzione", link: "costituzione.html" },
          // ← aggiungi qui nuove pagine
        ]
      }
    ];

    // ── genera l'indice ──────────────────────────
    const container = document.getElementById("index");

    sections.forEach(section => {
      const h2 = document.createElement("h2");
      h2.className = "section-title";
      h2.textContent = section.name;
      container.appendChild(h2);

      const ul = document.createElement("ul");

      section.pages.forEach(page => {
        const li = document.createElement("li");
        const a  = document.createElement("a");
        a.href = page.link;
        a.textContent = page.title;
        li.appendChild(a);
        ul.appendChild(li);
      });

      container.appendChild(ul);
    });
  </script>
</body>
</html>
